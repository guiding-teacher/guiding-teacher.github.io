<!-- results-admin.html - نسخة مستقلة وكاملة -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة كشوف النتائج</title>
    <link rel="stylesheet" href="css/results-style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <style>
        /* إضافات بسيطة لضمان ظهور الحقول */
        .res-form-group { margin-bottom: 15px; }
        .res-input, .res-input textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        .step-wizard { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .step-item { text-align: center; flex: 1; }
        .step-circle { width: 35px; height: 35px; background: #ddd; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
        .step-item.active .step-circle { background: #2563eb; color: white; }
        .step-item.done .step-circle { background: #10b981; color: white; }
        .res-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .res-card-title { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; border-right: 4px solid #2563eb; padding-right: 10px; }
        .res-footer-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .res-btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; }
        .res-btn-primary { background: #2563eb; color: white; }
        .res-btn-gray { background: #e2e8f0; }
        .res-btn-success { background: #10b981; color: white; }
        .upload-zone { border: 2px dashed #aaa; padding: 30px; text-align: center; cursor: pointer; }
        .preview-table { width: 100%; border-collapse: collapse; }
        .preview-table th, .preview-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .code-badge { font-family: monospace; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; }
        .sheet-item { display: flex; justify-content: space-between; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .limit-badge { background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 0.8em; }
        .limit-badge.full { background: #fee2e2; color: #b91c1c; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="res-header" style="display: flex; justify-content: space-between; padding: 15px; background: #1e293b; color: white;">
    <div><a href="admin.html" style="color: white;">← لوحة التحكم</a> | <strong>📊 كشوف النتائج</strong></div>
    <div><span id="limit-badge" class="limit-badge"></span> <span id="admin-email"></span></div>
</div>

<div class="res-main" style="padding: 20px; max-width: 1200px; margin: auto;">

    <!-- قائمة الكشوفات -->
    <div id="sheets-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>📋 كشوفاتي</h3>
            <button id="create-new-btn" class="res-btn res-btn-primary">+ إنشاء كشف جديد</button>
        </div>
        <div id="sheets-list" style="margin-top: 20px;">جاري التحميل...</div>
    </div>

    <!-- معالج الإنشاء (الخطوات) -->
    <div id="create-wizard" style="display: none;">
        <button id="back-to-list" class="res-btn res-btn-gray" style="margin-bottom: 15px;">← العودة للقائمة</button>

        <div class="step-wizard" id="step-wizard">
            <div class="step-item active" data-step="1"><div class="step-circle">1</div><div>معلومات الكشف</div></div>
            <div class="step-item" data-step="2"><div class="step-circle">2</div><div>رفع إكسل</div></div>
            <div class="step-item" data-step="3"><div class="step-circle">3</div><div>المعاينة</div></div>
            <div class="step-item" data-step="4"><div class="step-circle">4</div><div>الرابط والتنزيل</div></div>
        </div>

        <!-- الخطوة 1: كل الحقول موجودة هنا -->
        <div id="step-1" class="res-card">
            <div class="res-card-title">📝 معلومات الكشف الأساسية</div>
            <div class="res-form-group"><label>عنوان الكشف / المادة *</label><input type="text" id="sheet-title" class="res-input" placeholder="مثال: نتائج الصف السادس"></div>
            <div class="res-form-group"><label>اسم المدرس *</label><input type="text" id="sheet-teacher" class="res-input" placeholder="الاسم الرباعي"></div>
            <div class="res-form-group"><label>العام الدراسي</label><input type="text" id="sheet-year" class="res-input" placeholder="2024-2025"></div>
            <div class="res-form-group"><label>وصف الكشف (يظهر للطالب أسفل العنوان)</label><textarea id="sheet-description" class="res-input" rows="2" placeholder="اكتب وصفاً مختصراً للكشف..."></textarea></div>
            <div style="display: flex; gap: 15px;"><div class="res-form-group" style="flex:1"><label>تاريخ إعلان النتيجة</label><input type="date" id="sheet-date" class="res-input"></div>
            <div class="res-form-group" style="flex:1"><label>وقت الإعلان</label><input type="time" id="sheet-time" class="res-input"></div></div>
            <div class="res-form-group"><label>ملاحظات إضافية للطلاب</label><textarea id="sheet-notes" class="res-input" rows="2" placeholder="أي تنبيهات أخرى..."></textarea></div>
            <div id="step1-error" class="error-msg" style="color:red; display:none;"></div>
            <div class="res-footer-actions"><button id="cancel-create" class="res-btn res-btn-gray">إلغاء</button><button id="next-step1" class="res-btn res-btn-primary">التالي (رفع الملف) ←</button></div>
        </div>

        <!-- الخطوة 2: رفع الملف -->
        <div id="step-2" class="res-card" style="display:none;">
            <div class="res-card-title">📊 رفع ملف الإكسل</div>
            <div class="upload-zone" id="upload-zone">📂 انقر لاختيار ملف إكسل أو اسحب الملف هنا<br><small>.xlsx, .xls, .csv</small><input type="file" id="excel-file" accept=".xlsx,.xls,.csv" style="display:none;"></div>
            <div id="file-info" style="margin-top: 10px; display:none; background:#e6f7e6; padding:8px; border-radius:6px;"></div>
            <div id="step2-error" class="error-msg" style="color:red; display:none;"></div>
            <div class="res-footer-actions"><button id="prev-step2" class="res-btn res-btn-gray">← السابق</button><button id="next-step2" class="res-btn res-btn-primary" disabled>التالي ←</button></div>
        </div>

        <!-- الخطوة 3: المعاينة -->
        <div id="step-3" class="res-card" style="display:none;">
            <div class="res-card-title">👁️ معاينة البيانات</div>
            <div id="preview-stats"></div>
            <div style="overflow-x: auto;"><table class="preview-table" id="preview-table"><thead id="preview-head"></thead><tbody id="preview-body"></tbody></table></div>
            <div id="step3-error" class="error-msg" style="color:red; display:none;"></div>
            <div class="res-footer-actions"><button id="prev-step3" class="res-btn res-btn-gray">← السابق</button><button id="save-sheet" class="res-btn res-btn-success">💾 حفظ وإنشاء الرابط</button></div>
        </div>

        <!-- الخطوة 4: النجاح -->
        <div id="step-4" class="res-card" style="display:none;">
            <div class="res-card-title">🎉 تم إنشاء الكشف بنجاح</div>
            <div><label>رابط الاستعلام:</label><div style="display:flex;"><input type="text" id="sheet-link" readonly style="flex:1; direction:ltr;"><button id="copy-link" class="res-btn res-btn-primary">نسخ</button></div></div>
            <div style="margin-top: 15px;"><button id="download-excel" class="res-btn res-btn-success">📊 تنزيل إكسل مع الرموز</button> <button id="print-barcodes" class="res-btn res-btn-warning">🖨️ طباعة الرموز والباركود</button></div>
            <div class="res-footer-actions"><button id="finish-wizard" class="res-btn res-btn-outline">إنهاء وعرض الكشوفات</button></div>
        </div>
    </div>
</div>

<script type="module">
    // Firebase config (استبدل ببياناتك)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, updateDoc, query, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB...",  // ضع بياناتك الحقيقية
        authDomain: "your-app.firebaseapp.com",
        projectId: "your-project-id",
        storageBucket: "your-app.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:..."
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // متغيرات عامة
    const MAX_SHEETS = 5;
    let currentUser = null;
    let allSheets = {};
    let parsedStudents = [];
    let gradeColumns = [];

    // توليد رمز عشوائي 9 خانات
    function generateCode(usedSet) {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let code;
        do { code = Array.from({length:9}, () => chars[Math.floor(Math.random() * chars.length)]).join(''); }
        while (usedSet.has(code));
        usedSet.add(code);
        return code;
    }

    // عرض الكشوفات
    async function loadSheets() {
        if (!currentUser) return;
        const container = document.getElementById('sheets-list');
        try {
            const q = query(collection(db, "result_sheets"), where("adminId", "==", currentUser.uid));
            const snap = await getDocs(q);
            const count = snap.size;
            document.getElementById('limit-badge').innerHTML = `${count} / ${MAX_SHEETS} كشوفات`;
            document.getElementById('limit-badge').classList.toggle('full', count >= MAX_SHEETS);
            if (snap.empty) { container.innerHTML = "<div style='text-align:center;padding:40px;'>لا توجد كشوفات بعد</div>"; return; }
            allSheets = {};
            let html = "";
            snap.forEach(doc => {
                let s = { id: doc.id, ...doc.data() };
                allSheets[doc.id] = s;
                html += `<div class="sheet-item">
                            <div><strong>${escapeHtml(s.title)}</strong><br><small>👨‍🏫 ${escapeHtml(s.teacher)} | 👥 ${s.studentCount||0} طالب | 📅 ${s.date||''} ${s.time||''}</small></div>
                            <div>
                                <button class="res-btn res-btn-primary" data-id="${s.id}" data-action="link">🔗 رابط</button>
                                <button class="res-btn res-btn-success" data-id="${s.id}" data-action="excel">📊 إكسل</button>
                                <button class="res-btn res-btn-warning" data-id="${s.id}" data-action="barcode">🖨️ رموز</button>
                                <button class="res-btn res-btn-danger" data-id="${s.id}" data-action="delete">🗑️</button>
                            </div>
                        </div>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('[data-action]').forEach(btn => {
                btn.onclick = () => handleSheetAction(btn.dataset.id, btn.dataset.action);
            });
        } catch(e) { container.innerHTML = `<div style="color:red;">خطأ: ${e.message}</div>`; }
    }

    function handleSheetAction(id, action) {
        const sheet = allSheets[id];
        if (!sheet) return;
        if (action === 'link') copyLink(id);
        else if (action === 'excel') downloadExcelWithCodes(sheet);
        else if (action === 'barcode') printBarcodes(sheet);
        else if (action === 'delete') deleteSheetConfirm(id, sheet.title);
    }

    function copyLink(id) {
        const link = `${window.location.origin}${window.location.pathname.replace('results-admin.html', 'results-lookup.html')}?sheet=${id}`;
        navigator.clipboard.writeText(link).then(()=>alert("✅ تم نسخ الرابط"));
    }

    function downloadExcelWithCodes(sheet) {
        const cols = sheet.gradeColumns || [];
        const students = Object.entries(sheet.studentsByCode || {}).map(([code, s]) => ({ name: s.name, code, grades: s.grades }));
        const headers = ['الاسم', 'الرمز السري', ...cols];
        const rows = students.map(s => [s.name, s.code, ...cols.map(c => s.grades[c] === '---' ? '' : s.grades[c])]);
        const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'النتائج');
        XLSX.writeFile(wb, `${sheet.title}.xlsx`);
    }

    function printBarcodes(sheet) {
        const students = Object.entries(sheet.studentsByCode || {}).map(([code, s]) => ({ name: s.name, code }));
        const win = window.open('', '_blank');
        win.document.write(`
            <html dir="rtl"><head><title>رموز ${sheet.title}</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"><\/script>
            <style>.card{ border:1px solid #000; padding:10px; margin:10px; text-align:center; display:inline-block; width:200px; }</style></head>
            <body><h2>${escapeHtml(sheet.title)}</h2>${students.map((s,i)=>`<div class="card"><div>${escapeHtml(s.name)}</div><div>${s.code}</div><svg id="b${i}"></svg></div>`).join('')}
            <script>${students.map((_,i)=>`JsBarcode("#b${i}", "${students[i].code}", {format:"CODE128", height:40});`).join('')}<\/script>
            <button onclick="window.print()">طباعة</button></body></html>
        `);
        win.document.close();
    }

    async function deleteSheetConfirm(id, title) {
        if (!confirm(`حذف كشف "${title}" نهائياً؟`)) return;
        await deleteDoc(doc(db, "result_sheets", id));
        loadSheets();
    }

    // معالج إنشاء كشف جديد
    async function showWizard() {
        if (!currentUser) return;
        const q = query(collection(db, "result_sheets"), where("adminId", "==", currentUser.uid));
        const snap = await getDocs(q);
        if (snap.size >= MAX_SHEETS) { alert(`⚠️ لا يمكنك إنشاء أكثر من ${MAX_SHEETS} كشوفات.`); return; }
        document.getElementById('sheets-section').style.display = 'none';
        document.getElementById('create-wizard').style.display = 'block';
        // تعبئة التاريخ والوقت الحاليين
        const now = new Date();
        document.getElementById('sheet-date').value = now.toISOString().split('T')[0];
        document.getElementById('sheet-time').value = now.toTimeString().slice(0,5);
        // تفريغ الحقول
        document.getElementById('sheet-title').value = '';
        document.getElementById('sheet-teacher').value = '';
        document.getElementById('sheet-year').value = '';
        document.getElementById('sheet-description').value = '';
        document.getElementById('sheet-notes').value = '';
        document.getElementById('file-info').style.display = 'none';
        document.getElementById('next-step2').disabled = true;
        goToStep(1);
    }

    function hideWizard() {
        document.getElementById('create-wizard').style.display = 'none';
        document.getElementById('sheets-section').style.display = 'block';
        loadSheets();
    }

    function goToStep(step) {
        for(let i=1;i<=4;i++) {
            const div = document.getElementById(`step-${i}`);
            if(div) div.style.display = i===step ? 'block' : 'none';
            const item = document.querySelector(`.step-item[data-step="${i}"]`);
            if(item) {
                item.classList.remove('active','done');
                if(i===step) item.classList.add('active');
                else if(i<step) item.classList.add('done');
            }
        }
    }

    // رفع ملف Excel
    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('excel-file');
    uploadZone.onclick = () => fileInput.click();
    uploadZone.ondragover = e => e.preventDefault();
    uploadZone.ondrop = e => { e.preventDefault(); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); };
    fileInput.onchange = e => { if(e.target.files[0]) processFile(e.target.files[0]); };

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                if(rows.length < 2) throw new Error("الملف فارغ");
                const headers = rows[0];
                gradeColumns = headers.slice(1).map(h => String(h).trim());
                parsedStudents = [];
                const usedCodes = new Set();
                for(let i=1; i<rows.length; i++) {
                    const name = String(rows[i][0] || "").trim();
                    if(!name) continue;
                    const grades = {};
                    gradeColumns.forEach((col, idx) => { grades[col] = rows[i][idx+1] !== undefined ? rows[i][idx+1] : "---"; });
                    parsedStudents.push({ name, code: generateCode(usedCodes), grades });
                }
                if(parsedStudents.length === 0) throw new Error("لا توجد أسماء طلاب");
                document.getElementById('file-info').innerHTML = `✅ تم تحميل ${parsedStudents.length} طالب، ${gradeColumns.length} عمود`;
                document.getElementById('file-info').style.display = 'block';
                document.getElementById('next-step2').disabled = false;
            } catch(err) { alert("خطأ: "+err.message); }
        };
        reader.readAsArrayBuffer(file);
    }

    // بناء المعاينة
    function buildPreview() {
        if(parsedStudents.length === 0) return;
        document.getElementById('preview-stats').innerHTML = `<div>عدد الطلاب: ${parsedStudents.length} | الأعمدة: ${gradeColumns.length} | طول الرمز: 9</div>`;
        const thead = document.getElementById('preview-head');
        thead.innerHTML = `<tr><th>#</th><th>الاسم</th><th>الرمز السري</th>${gradeColumns.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}</tr>`;
        const tbody = document.getElementById('preview-body');
        tbody.innerHTML = parsedStudents.slice(0,10).map((s,i)=>`
            <tr><td>${i+1}</td><td>${escapeHtml(s.name)}</td><td><span class="code-badge">${s.code}</span></td>${gradeColumns.map(c=>`<td>${escapeHtml(String(s.grades[c]))}</td>`).join('')}</tr>
        `).join('');
        if(parsedStudents.length > 10) tbody.innerHTML += `<tr><td colspan="${gradeColumns.length+3}">... و ${parsedStudents.length-10} طالب آخر</td></tr>`;
        goToStep(3);
    }

    // حفظ الكشف
    async function saveSheet() {
        const title = document.getElementById('sheet-title').value.trim();
        const teacher = document.getElementById('sheet-teacher').value.trim();
        if(!title || !teacher) { alert("الرجاء إدخال عنوان الكشف واسم المدرس"); return; }
        if(parsedStudents.length === 0) { alert("لا توجد بيانات طلاب"); return; }
        const btn = document.getElementById('save-sheet');
        btn.disabled = true; btn.textContent = "جاري الحفظ...";
        try {
            const sheetRef = doc(collection(db, "result_sheets"));
            const studentsByCode = {};
            parsedStudents.forEach(s => { studentsByCode[s.code] = { name: s.name, grades: s.grades }; });
            await setDoc(sheetRef, {
                title, teacher,
                description: document.getElementById('sheet-description').value.trim(),
                date: document.getElementById('sheet-date').value,
                time: document.getElementById('sheet-time').value,
                year: document.getElementById('sheet-year').value.trim(),
                notes: document.getElementById('sheet-notes').value.trim(),
                adminId: currentUser.uid,
                createdAt: Timestamp.now(),
                gradeColumns,
                studentsByCode,
                studentCount: parsedStudents.length
            });
            const link = `${window.location.origin}${window.location.pathname.replace('results-admin.html', 'results-lookup.html')}?sheet=${sheetRef.id}`;
            document.getElementById('sheet-link').value = link;
            goToStep(4);
        } catch(e) { alert("خطأ في الحفظ: "+e.message); } finally { btn.disabled = false; btn.textContent = "💾 حفظ وإنشاء الرابط"; }
    }

    // أحداث الأزرار
    document.getElementById('create-new-btn').onclick = showWizard;
    document.getElementById('back-to-list').onclick = hideWizard;
    document.getElementById('cancel-create').onclick = hideWizard;
    document.getElementById('next-step1').onclick = () => {
        const title = document.getElementById('sheet-title').value.trim();
        const teacher = document.getElementById('sheet-teacher').value.trim();
        if(!title || !teacher) { document.getElementById('step1-error').innerHTML = "يرجى ملء عنوان الكشف واسم المدرس"; document.getElementById('step1-error').style.display = 'block'; return; }
        document.getElementById('step1-error').style.display = 'none';
        goToStep(2);
    };
    document.getElementById('prev-step2').onclick = () => goToStep(1);
    document.getElementById('next-step2').onclick = buildPreview;
    document.getElementById('prev-step3').onclick = () => goToStep(2);
    document.getElementById('save-sheet').onclick = saveSheet;
    document.getElementById('copy-link').onclick = () => { const val = document.getElementById('sheet-link').value; if(val) navigator.clipboard.writeText(val).then(()=>alert("تم نسخ الرابط")); };
    document.getElementById('download-excel').onclick = () => downloadExcelWithCodes({ title: document.getElementById('sheet-title').value, gradeColumns, studentsByCode: Object.fromEntries(parsedStudents.map(s=>[s.code,{name:s.name, grades:s.grades}])) });
    document.getElementById('print-barcodes').onclick = () => printBarcodes({ title: document.getElementById('sheet-title').value, studentsByCode: Object.fromEntries(parsedStudents.map(s=>[s.code,{name:s.name}])) });
    document.getElementById('finish-wizard').onclick = hideWizard;

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

    // المصادقة
    onAuthStateChanged(auth, (user) => {
        if(!user) { window.location.href = 'admin-login.html'; return; }
        currentUser = user;
        document.getElementById('admin-email').innerText = user.email;
        document.body.style.display = 'block';
        loadSheets();
    });
</script>
</body>
</html>
