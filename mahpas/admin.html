<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة - لعبة المحيبس</title>
    
    <!-- مكتبات فايربيس -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <!-- خطوط وأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #8b4513;
            --secondary: #D4AF37;
            --dark: #1a1a1a;
            --light: #f4f6f9;
            --success: #2ecc71;
            --danger: #e74c3c;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* --- تنسيق شاشة الدخول --- */
        .login-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--dark));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 { color: var(--primary); margin-bottom: 25px; }
        
        .form-input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.3s;
        }

        .form-input:focus { border-color: var(--secondary); outline: none; }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover { background: #6d360f; transform: translateY(-2px); }

        /* --- لوحة التحكم --- */
        .dashboard-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        /* رأس الصفحة */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .logo h1 { margin: 0; font-size: 1.5em; color: var(--primary); }
        .logo span { color: var(--secondary); font-size: 0.8em; }

        .btn-logout {
            background: #ffebee;
            color: var(--danger);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* شريط الحالة */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(139, 69, 19, 0.2);
        }

        .stat-value { font-size: 1.8em; font-weight: 800; }
        .stat-label { font-size: 0.9em; opacity: 0.9; }

        /* منطقة التحكم */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--secondary);
        }

        .card-title {
            margin-top: 0;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* تحسين المدخلات */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #666; }
        
        select.form-input { appearance: none; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="gray" d="M7 10l5 5 5-5z"/></svg>') no-repeat left 10px center white; }

        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .btn-set { background: #e3f2fd; color: #1565c0; }
        .btn-start { background: var(--success); color: white; }
        .btn-start:disabled { background: #ccc; cursor: not-allowed; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-toggle { background: #f3e5f5; color: #7b1fa2; }

        /* --- المعاينة الحية (Live Preview) --- */
        .preview-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            overflow-x: auto; /* للسماح بالتمرير في الموبايل */
            padding-bottom: 5px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }

        .tab-btn.active { color: var(--primary); border-color: var(--primary); }

        /* شبكة الأيدي المصغرة */
        .mini-hands-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .mini-hand {
            aspect-ratio: 1/1;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
            color: #888;
            font-size: 0.9em;
        }

        .mini-hand.has-ring {
            background: #fff8e1;
            border-color: var(--secondary);
            color: var(--primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        
        .mini-hand.has-ring::after {
            content: '💍';
            position: absolute;
            font-size: 1.2em;
        }

        /* جدول المشاركين */
        .participants-table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .participants-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .participants-table th, .participants-table td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }

        .participants-table th {
            background-color: #f8f9fa;
            color: var(--primary);
            font-weight: bold;
        }

        .participants-table tr:hover { background-color: #fcfcfc; }
        
        .empty-state {
            padding: 30px;
            text-align: center;
            color: #888;
            font-style: italic;
        }

        /* الدردشة المصغرة */
        .chat-preview {
            height: 300px;
            border: 1px solid #eee;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            background: #fdfdfd;
        }

        .chat-messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-size: 0.9em;
        }

        .chat-msg {
            padding: 8px 12px;
            background: #f0f0f0;
            border-radius: 15px;
            margin-bottom: 8px;
            width: fit-content;
            max-width: 80%;
        }

        .chat-msg.admin { background: #e3f2fd; color: #0d47a1; margin-right: auto; }
        
        .chat-sender { font-size: 0.75em; color: #666; display: block; margin-bottom: 2px; }

        /* حقل الرسائل المحسن */
        .msg-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #eee;
            background: white;
            border-radius: 0 0 10px 10px;
        }

        .msg-input-area input {
            flex: 1;
            border: none;
            background: #f5f5f5;
            padding: 10px 15px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .msg-input-area input:focus { outline: none; background: #eee; }

        .btn-send-mini {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        /* Media Queries */
        @media (max-width: 768px) {
            .mini-hands-grid { grid-template-columns: repeat(4, 1fr); }
            .header { flex-direction: column; gap: 10px; text-align: center; }
            .btn-logout { width: 100%; }
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- التنبيهات المنبثقة -->
    <div id="toast" class="toast"><i class="fas fa-info-circle"></i> <span>تمت العملية</span></div>

    <!-- قسم تسجيل الدخول -->
    <div id="login-section" class="login-wrapper">
        <div class="login-box">
            <h2><i class="fas fa-user-shield"></i> بوابة المشرفين</h2>
            <input type="email" id="admin-email" class="form-input" placeholder="البريد الإلكتروني">
            <input type="password" id="admin-password" class="form-input" placeholder="كلمة المرور">
            <button id="login-btn" class="btn-main">دخول آمن</button>
            <p id="login-error" style="color: var(--danger); font-size: 0.9em; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard-section" class="dashboard-container">
        
        <!-- الرأس -->
        <header class="header">
            <div class="logo">
                <h1>لعبة المحيبس <i class="fas fa-ring" style="color: var(--secondary);"></i></h1>
                <span>لوحة التحكم والإدارة المركزية</span>
            </div>
            <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
        </header>

        <!-- الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="live-players-count">0</div>
                <div class="stat-label">المتصلين الآن</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #2c3e50, #4ca1af);">
                <div class="stat-value" id="live-timer">00:00</div>
                <div class="stat-label">عداد الوقت</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
                <div class="stat-value" id="total-participants">0</div>
                <div class="stat-label">المشاركين بالجولة</div>
            </div>
        </div>

        <div class="controls-grid">
            <!-- بطاقة التحكم بالجولة -->
            <div class="control-card">
                <h3 class="card-title"><i class="fas fa-gamepad"></i> إعداد الجولة</h3>
                
                <div class="input-group">
                    <label>1. مكان المحبس (سري)</label>
                    <select id="admin-hand" class="form-input">
                        <option value="-1">-- اختر اليد --</option>
                    </select>
                    <button id="set-ring-btn" class="action-btn btn-set">
                        <i class="fas fa-eye-slash"></i> إخفاء المحبس
                    </button>
                </div>

                <div class="input-group">
                    <label>2. مدة الوقت (دقائق)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="game-duration" class="form-input" value="1" min="1" max="60">
                    </div>
                    <button id="start-game-btn" class="action-btn btn-start" disabled>
                        <i class="fas fa-play"></i> بدء اللعب
                    </button>
                </div>
            </div>

            <!-- بطاقة التواصل وإعادة التعيين -->
            <div class="control-card">
                <h3 class="card-title"><i class="fas fa-tools"></i> أدوات سريعة</h3>
                
                <div class="input-group">
                    <label>رسالة عاجلة (شريط علوي)</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="admin-note-input" class="form-input" placeholder="مثال: آخر جولة!" style="margin-bottom:0;">
                        <button id="set-note-btn" class="btn-main" style="width: auto; padding: 0 20px;"><i class="fas fa-bullhorn"></i></button>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button id="toggle-chat-btn" class="action-btn btn-toggle">
                        <i class="fas fa-comments"></i> قفل/فتح الشات
                    </button>
                    <button id="clear-chat-btn" class="action-btn btn-toggle" style="background:#ffebee; color:#c62828;">
                        <i class="fas fa-trash-alt"></i> مسح الشات
                    </button>
                </div>
                
                <button id="reset-game-btn" class="action-btn btn-danger" style="margin-top: 15px;">
                    <i class="fas fa-power-off"></i> إنهاء الجولة وإعادة التعيين
                </button>
            </div>
        </div>

        <!-- المعاينة الحية -->
        <div class="preview-section">
            <h3 class="card-title"><i class="fas fa-desktop"></i> المعاينة الحية</h3>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('hands')">كشف الأيدي</button>
                <button class="tab-btn" onclick="switchTab('participants')">جدول المشاركين</button>
                <button class="tab-btn" onclick="switchTab('chat')">الدردشة الحية</button>
            </div>

            <!-- تبويب كشف الأيدي -->
            <div id="tab-hands">
                <div class="mini-hands-grid" id="mini-hands-container">
                    <!-- سيتم توليد الأيدي هنا بالجافاسكربت -->
                </div>
                <p style="text-align: center; color: #666; font-size: 0.9em; margin-top: 10px;">
                    <i class="fas fa-info-circle"></i> اليد الصفراء هي التي تحتوي على المحبس
                </p>
            </div>

            <!-- تبويب جدول المشاركين (الجديد) -->
            <div id="tab-participants" style="display: none;">
                <div class="participants-table-wrapper">
                    <table class="participants-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>اسم اللاعب</th>
                                <th>اليد المختارة</th>
                                <th>الوقت</th>
                            </tr>
                        </thead>
                        <tbody id="participants-list">
                            <!-- سيتم إضافة الصفوف هنا -->
                        </tbody>
                    </table>
                    <div id="empty-participants" class="empty-state">لا يوجد مشاركين حتى الآن</div>
                </div>
            </div>

            <!-- تبويب الدردشة -->
            <div id="tab-chat" style="display: none;">
                <div class="chat-preview">
                    <div class="chat-messages-area" id="admin-chat-messages">
                        <!-- الرسائل ستظهر هنا -->
                    </div>
                    <div class="msg-input-area">
                        <input type="text" id="admin-chat-input" placeholder="أرسل رسالة بصفتك المشرف...">
                        <button id="admin-send-btn" class="btn-send-mini"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- إعدادات فايربيس ---
        const firebaseConfig = {
            apiKey: "AIzaSyD_7PrXfJAnEEx2q12LGGwdlpflfBEYgP4",
            authDomain: "iraq-mheibs-game.firebaseapp.com",
            databaseURL: "https://iraq-mheibs-game-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iraq-mheibs-game",
            storageBucket: "iraq-mheibs-game.appspot.com",
            messagingSenderId: "83560429652",
            appId: "1:83560429652:web:1420dacee1690da03e55c1",
            measurementId: "G-28WYG704BH"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const auth = firebase.auth();
        const currentGameId = 'default';

        // --- المتغيرات العامة ---
        const dom = {
            loginSection: document.getElementById('login-section'),
            dashboardSection: document.getElementById('dashboard-section'),
            emailInput: document.getElementById('admin-email'),
            passInput: document.getElementById('admin-password'),
            loginBtn: document.getElementById('login-btn'),
            logoutBtn: document.getElementById('logout-btn'),
            errorMsg: document.getElementById('login-error'),
            handSelect: document.getElementById('admin-hand'),
            miniHandsContainer: document.getElementById('mini-hands-container'),
            chatMessages: document.getElementById('admin-chat-messages'),
            chatInput: document.getElementById('admin-chat-input'),
            sendBtn: document.getElementById('admin-send-btn'),
            liveTimer: document.getElementById('live-timer'),
            toast: document.getElementById('toast'),
            participantsList: document.getElementById('participants-list'),
            emptyParticipants: document.getElementById('empty-participants')
        };

        let ringHandIndex = -1;
        let timerInterval;

        // --- تهيئة الصفحة ---
        document.addEventListener('DOMContentLoaded', () => {
            generateMiniHands();
            fillHandSelect();
        });

        // --- منطق المصادقة ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                showDashboard();
                showToast(`مرحباً بك: ${user.email}`, 'success');
            } else {
                showLogin();
            }
        });

        dom.loginBtn.addEventListener('click', () => {
            const email = dom.emailInput.value;
            const password = dom.passInput.value;
            dom.errorMsg.style.display = 'none';
            dom.loginBtn.textContent = 'جاري التحقق...';

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    dom.loginBtn.textContent = 'دخول آمن';
                    dom.passInput.value = '';
                })
                .catch((error) => {
                    dom.loginBtn.textContent = 'دخول آمن';
                    dom.errorMsg.textContent = "بيانات الدخول غير صحيحة";
                    dom.errorMsg.style.display = 'block';
                });
        });

        dom.logoutBtn.addEventListener('click', () => {
            auth.signOut();
        });

        function showLogin() {
            dom.loginSection.style.display = 'flex';
            dom.dashboardSection.style.display = 'none';
        }

        function showDashboard() {
            dom.loginSection.style.display = 'none';
            dom.dashboardSection.style.display = 'block';
            initAdminLogic();
        }

        // --- منطق اللعبة ---
        function initAdminLogic() {
            // 1. تعيين المحبس
            document.getElementById('set-ring-btn').addEventListener('click', () => {
                const selected = parseInt(dom.handSelect.value);
                if (selected === -1) { showToast("الرجاء اختيار يد", 'error'); return; }
                
                ringHandIndex = selected;
                database.ref('games/' + currentGameId + '/gameState').update({
                    ringHandIndex: ringHandIndex
                }).then(() => {
                    showToast(`تم إخفاء المحبس في اليد رقم ${selected + 1}`, 'success');
                    updateMiniHands(selected);
                    document.getElementById('start-game-btn').disabled = false;
                });
            });

            // 2. بدء اللعبة
            document.getElementById('start-game-btn').addEventListener('click', () => {
                const duration = parseInt(document.getElementById('game-duration').value) * 60;
                const now = Date.now();
                const endTime = now + (duration * 1000);

                database.ref('games/' + currentGameId + '/gameState').update({
                    started: true,
                    gameEndTime: endTime,
                    gameOver: false,
                    gameDuration: duration
                });
                showToast("تم بدء اللعبة والوقت!", 'success');
            });

            // 3. إعادة التعيين
            document.getElementById('reset-game-btn').addEventListener('click', () => {
                if(confirm("تحذير: هذا سيحذف جميع بيانات الجولة الحالية ويعيد تصفير كل شيء. هل أنت متأكد؟")) {
                    database.ref('games/' + currentGameId + '/participants').remove();
                    database.ref('games/' + currentGameId + '/messages').remove();
                    database.ref('games/' + currentGameId + '/gameState').update({
                        started: false,
                        gameEndTime: 0,
                        ringHandIndex: -1,
                        gameOver: false
                    });
                    document.getElementById('start-game-btn').disabled = true;
                    dom.handSelect.value = "-1";
                    updateMiniHands(-1);
                    showToast("تم تصفير الجولة بنجاح", 'success');
                }
            });

            // 4. إدارة الدردشة
            document.getElementById('toggle-chat-btn').addEventListener('click', () => {
                database.ref('games/' + currentGameId + '/chatEnabled').once('value', snap => {
                    const current = snap.val();
                    const newState = current === false ? true : false;
                    database.ref('games/' + currentGameId + '/chatEnabled').set(newState);
                    showToast(newState ? "تم فتح الشات" : "تم قفل الشات", newState ? 'success' : 'error');
                });
            });

            document.getElementById('clear-chat-btn').addEventListener('click', () => {
                if(confirm("هل أنت متأكد من مسح جميع الرسائل؟")) {
                    database.ref('games/' + currentGameId + '/messages').remove();
                    showToast("تم تنظيف الشات", 'success');
                }
            });

            // 5. إرسال ملاحظة
            document.getElementById('set-note-btn').addEventListener('click', () => {
                const note = document.getElementById('admin-note-input').value;
                if(note) {
                    database.ref('games/' + currentGameId + '/adminNote').set(note);
                    showToast("تم نشر الملاحظة", 'success');
                } else {
                    database.ref('games/' + currentGameId + '/adminNote').remove();
                    showToast("تم إزالة الملاحظة", 'success');
                }
            });

            // 6. الدردشة من لوحة المشرف
            dom.sendBtn.addEventListener('click', sendAdminMessage);
            dom.chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendAdminMessage();
            });

            // --- المراقبين (Listeners) ---
            
            // مراقبة العداد والوقت
            database.ref('games/' + currentGameId + '/gameState').on('value', snap => {
                const state = snap.val();
                if (state && state.gameEndTime) {
                    clearInterval(timerInterval);
                    timerInterval = setInterval(() => {
                        const timeLeft = Math.max(0, Math.floor((state.gameEndTime - Date.now()) / 1000));
                        const m = Math.floor(timeLeft / 60);
                        const s = timeLeft % 60;
                        dom.liveTimer.textContent = `${m}:${s < 10 ? '0'+s : s}`;
                        if (timeLeft <= 0) clearInterval(timerInterval);
                    }, 1000);
                } else {
                    dom.liveTimer.textContent = "متوقفة";
                    clearInterval(timerInterval);
                }
                
                if(state && state.ringHandIndex !== undefined) {
                    updateMiniHands(state.ringHandIndex);
                }
            });

            // مراقبة اللاعبين
            database.ref('games/' + currentGameId + '/players').on('value', snap => {
                document.getElementById('live-players-count').textContent = snap.numChildren() || 0;
            });

            // مراقبة المشاركين وتحديث الجدول (الجزء الجديد)
            database.ref('games/' + currentGameId + '/participants').on('value', snap => {
                const participants = snap.val() || {};
                const count = Object.keys(participants).length;
                document.getElementById('total-participants').textContent = count;
                
                // تحديث الجدول
                dom.participantsList.innerHTML = '';
                if (count > 0) {
                    dom.emptyParticipants.style.display = 'none';
                    // تحويل المشاركين لمصفوفة وفرزهم حسب الوقت
                    const sorted = Object.values(participants).sort((a, b) => b.timestamp - a.timestamp);
                    
                    sorted.forEach((p, index) => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${count - index}</td>
                            <td style="font-weight:bold; color:var(--primary);">${p.name}</td>
                            <td><span style="background:#eee; padding:3px 8px; border-radius:5px;">${p.hand}</span></td>
                            <td dir="ltr" style="font-size:0.8em; color:#666;">${p.timeString}</td>
                        `;
                        dom.participantsList.appendChild(row);
                    });
                } else {
                    dom.emptyParticipants.style.display = 'block';
                }
            });

            // مراقبة الرسائل
            database.ref('games/' + currentGameId + '/messages').limitToLast(50).on('value', snap => {
                dom.chatMessages.innerHTML = '';
                const msgs = snap.val();
                if (msgs) {
                    Object.values(msgs).forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `chat-msg ${msg.isAdmin ? 'admin' : ''}`;
                        div.innerHTML = `
                            <span class="chat-sender">${msg.isAdmin ? 'المشرف' : msg.senderName}</span>
                            ${msg.text}
                        `;
                        dom.chatMessages.appendChild(div);
                    });
                    dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
                }
            });
        }

        // --- دوال مساعدة ---

        function generateMiniHands() {
            dom.miniHandsContainer.innerHTML = '';
            for (let i = 0; i < 24; i++) {
                const div = document.createElement('div');
                div.className = 'mini-hand';
                div.textContent = i + 1;
                div.id = `mini-hand-${i}`;
                dom.miniHandsContainer.appendChild(div);
            }
        }

        function updateMiniHands(ringIndex) {
            document.querySelectorAll('.mini-hand').forEach(el => el.classList.remove('has-ring'));
            if (ringIndex !== -1) {
                const target = document.getElementById(`mini-hand-${ringIndex}`);
                if (target) target.classList.add('has-ring');
            }
        }

        function fillHandSelect() {
            dom.handSelect.innerHTML = '<option value="-1">-- اختر اليد --</option>';
            for (let i = 1; i <= 24; i++) {
                const option = document.createElement('option');
                option.value = i - 1;
                option.textContent = `اليد رقم ${i}`;
                dom.handSelect.appendChild(option);
            }
        }

        function sendAdminMessage() {
            const text = dom.chatInput.value.trim();
            if (!text) return;

            database.ref('games/' + currentGameId + '/messages').push({
                text: text,
                senderId: 'admin',
                senderName: 'المشرف',
                isAdmin: true,
                timestamp: Date.now()
            });
            dom.chatInput.value = '';
        }

        function showToast(message, type = 'success') {
            const toast = dom.toast;
            toast.className = `toast show ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> <span>${message}</span>`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // التبديل بين التبويبات
        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            // تحديد الزر النشط بناءً على التبويب
            const btns = document.querySelectorAll('.tab-btn');
            if(tabName === 'hands') btns[0].classList.add('active');
            else if(tabName === 'participants') btns[1].classList.add('active');
            else if(tabName === 'chat') btns[2].classList.add('active');
            
            document.getElementById('tab-hands').style.display = tabName === 'hands' ? 'block' : 'none';
            document.getElementById('tab-participants').style.display = tabName === 'participants' ? 'block' : 'none';
            document.getElementById('tab-chat').style.display = tabName === 'chat' ? 'block' : 'none';
        }

    </script>
</body>
</html>
